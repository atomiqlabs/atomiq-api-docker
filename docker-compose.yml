services:
  atomiq-api:
    image: atomiqlabs/api
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/src/config:ro
      - ./storage:/src/storage
      # Place TLS files or symlinks under ./config/tls and reference them from config/config.yaml.
    environment:
      CONFIG_PATH: /src/config/config.yaml
      STORAGE_DIR: /src/storage
